<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html { background: #0D1117; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0D1117; font-family: Arial, sans-serif;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.accent-bar {
  position: absolute; left: 0; top: 0; bottom: 0; width: 8pt;
  background: #7C3AED;
}
.accent-bottom {
  position: absolute; bottom: 0; left: 8pt; right: 0; height: 4pt;
  background: #06B6D4;
}
.dot-grid {
  position: absolute; right: 0; top: 0; width: 280pt; height: 405pt;
  background: #0D1117;
  opacity: 0.4;
}
.center {
  text-align: center; z-index: 2; padding: 0 60pt;
}
.tag {
  display: inline-block; background: #7C3AED22; border: 1pt solid #7C3AED;
  border-radius: 20pt; padding: 4pt 16pt; margin-bottom: 20pt;
}
.tag p { color: #A78BFA; font-size: 11pt; margin: 0; letter-spacing: 2pt; text-transform: uppercase; }
h1 { color: #FFFFFF; font-size: 42pt; margin: 0 0 12pt 0; line-height: 1.1; }
h1 span { color: #7C3AED; }
.subtitle { color: #94A3B8; font-size: 14pt; margin: 0 0 30pt 0; }
.divider {
  width: 60pt; height: 3pt; background: #06B6D4; margin: 0 auto 30pt auto;
}
.meta { color: #475569; font-size: 10pt; }
.meta span { color: #64748B; }
.corner-mark {
  position: absolute; top: 20pt; right: 24pt; text-align: right;
}
.corner-mark p { color: #1E293B; font-size: 9pt; margin: 0; }
.corner-mark p span { color: #334155; }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="accent-bottom"></div>
<div class="corner-mark">
  <p><span>SessionForge</span></p>
  <p>CONFIDENTIAL</p>
</div>
<div class="center">
  <div class="tag"><p>SALES INTELLIGENCE</p></div>
  <h1>SessionForge<br><span>Battle Cards</span></h1>
  <div class="divider"></div>
  <p class="subtitle">Competitive Analysis Across 31 Products in 8 Categories</p>
  <p class="meta">February 2026 &nbsp;&middot;&nbsp; <span>Internal Use Only</span></p>
</div>
</body>
</html>
