name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install --prefer-offline
          else
            echo "No package.json found — skipping install."
          fi

      - name: Run ESLint
        run: |
          if [ -d "apps/web/src" ]; then
            cd apps/web && ../../node_modules/.bin/next lint
          else
            echo "No apps/web source on this branch — skipping lint."
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install --prefer-offline
          else
            echo "No package.json found — skipping install."
          fi

      - name: Run TypeScript compiler
        run: |
          if [ -f "apps/web/tsconfig.json" ] && [ -d "apps/web/src" ]; then
            cd apps/web && ../../node_modules/.bin/tsc --noEmit
          else
            echo "No apps/web source found on this branch — skipping typecheck."
          fi

  test:
    name: Unit Tests (agent-qa)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .worktrees/agent-qa
    steps:
      - name: Checkout (with worktrees)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout agent-qa branch into .worktrees/agent-qa
        run: |
          git worktree add .worktrees/agent-qa origin/dev/qa 2>/dev/null || \
          git worktree add .worktrees/agent-qa dev/qa 2>/dev/null || \
          echo "Worktree already present"
        working-directory: ${{ github.workspace }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ".worktrees/agent-qa/package-lock.json"

      - name: Install QA dependencies
        run: npm install --prefer-offline

      - name: Run unit tests
        run: npm run test:unit -- --reporter=verbose --coverage
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
          CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: .worktrees/agent-qa/coverage
          flags: unittests
          fail_ci_if_error: false

  go-ci:
    name: Go Agent (build + vet)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: go mod tidy
        run: cd agent && go mod tidy

      - name: go vet (linux)
        run: cd agent && go vet ./...

      - name: go vet (windows/amd64)
        run: cd agent && go vet ./...
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"

      - name: Build all platforms
        run: |
          cd agent
          GOOS=linux   GOARCH=amd64 go build -o /dev/null ./cmd/sessionforge
          GOOS=linux   GOARCH=arm64 go build -o /dev/null ./cmd/sessionforge
          GOOS=darwin  GOARCH=amd64 go build -o /dev/null ./cmd/sessionforge
          GOOS=darwin  GOARCH=arm64 go build -o /dev/null ./cmd/sessionforge
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/sessionforge
        env:
          CGO_ENABLED: "0"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install --prefer-offline
          else
            echo "No package.json found — skipping install."
          fi

      - name: Build Next.js app
        run: |
          if [ -d "apps/web/src" ]; then
            cd apps/web && ../../node_modules/.bin/next build
          else
            echo "No Next.js app source on this branch — skipping build."
          fi
        env:
          DATABASE_URL: postgresql://sessionforge:localdev@localhost:5432/sessionforge
          NEXTAUTH_SECRET: ci-placeholder-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: "1"
