<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SessionForge Battle Cards — Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050810; font-family: Arial, sans-serif; color: #fff; }
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
  background: #0D1117; border-bottom: 1px solid #1E293B;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.topbar .title { color: #A78BFA; font-size: 13px; font-weight: bold; letter-spacing: 1px; }
.topbar .counter { color: #64748B; font-size: 12px; }
.topbar .nav { display: flex; gap: 8px; align-items: center; }
.topbar button {
  background: #1E293B; border: 1px solid #334155; color: #CBD5E1;
  padding: 5px 14px; border-radius: 5px; cursor: pointer; font-size: 12px;
}
.topbar button:hover { background: #334155; }
.sidebar {
  position: fixed; left: 0; top: 48px; bottom: 0; width: 160px;
  background: #0D1117; border-right: 1px solid #1E293B;
  overflow-y: auto; padding: 12px 8px; z-index: 50;
}
.thumb-item {
  margin-bottom: 8px; cursor: pointer; border-radius: 4px; overflow: hidden;
  border: 2px solid transparent;
}
.thumb-item.active { border-color: #7C3AED; }
.thumb-wrapper { width: 140px; height: 79px; overflow: hidden; background: #0D1117; position: relative; }
.thumb-wrapper iframe {
  width: 720px; height: 405px;
  transform: scale(0.195); transform-origin: top left;
  pointer-events: none; display: block; border: none; position: absolute; top: 0; left: 0;
}
.thumb-num {
  background: #161B27; color: #64748B; font-size: 9px;
  padding: 2px 6px; text-align: center;
}
.thumb-item.active .thumb-num { color: #A78BFA; }
.viewer {
  position: fixed; left: 160px; top: 48px; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  background: #050810;
}
.slide-frame {
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  border-radius: 4px; overflow: hidden;
}
.slide-frame iframe { border: none; display: block; width: 720px; height: 405px; }
.hint { position: fixed; bottom: 12px; right: 20px; color: #334155; font-size: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">SESSIONFORGE BATTLE CARDS</div>
  <div class="counter" id="counter">Slide 1 of 12</div>
  <div class="nav">
    <button onclick="prev()">&#8592; Prev</button>
    <button onclick="next()">Next &#8594;</button>
  </div>
</div>

<div class="sidebar" id="sidebar"></div>

<div class="viewer">
  <div class="slide-frame" id="slideFrame">
    <iframe id="mainSlide" src="slides/slide01-cover.html"></iframe>
  </div>
</div>

<div class="hint">Use &#8592; &#8594; arrow keys to navigate</div>

<script>
var slides = [
  'slides/slide01-cover.html',
  'slides/slide02-positioning.html',
  'slides/slide03-landscape.html',
  'slides/slide04-bc1-oss.html',
  'slides/slide05-bc2-1code.html',
  'slides/slide06-bc3-warp.html',
  'slides/slide07-bc4-codespaces-coder.html',
  'slides/slide08-bc5-agentops-devin.html',
  'slides/slide09-bc6-primitives-rdp.html',
  'slides/slide10-objections.html',
  'slides/slide11-watchlist.html',
  'slides/slide12-closing.html'
];

var labels = [
  '01 Cover','02 Positioning','03 Landscape',
  '04 BC1 OSS Tools','05 BC2 1Code','06 BC3 Warp',
  '07 BC4+5 Codespaces','08 BC6+7 AgentOps','09 BC9+10 Primitives',
  '10 Objections','11 Watch List','12 Closing'
];

var current = 0;

function buildSidebar() {
  var sidebar = document.getElementById('sidebar');
  for (var i = 0; i < slides.length; i++) {
    (function(idx) {
      var item = document.createElement('div');
      item.className = idx === 0 ? 'thumb-item active' : 'thumb-item';
      item.id = 'thumb-' + idx;

      var wrapper = document.createElement('div');
      wrapper.className = 'thumb-wrapper';

      var fr = document.createElement('iframe');
      fr.src = slides[idx];
      fr.scrolling = 'no';
      wrapper.appendChild(fr);

      var num = document.createElement('div');
      num.className = 'thumb-num';
      num.textContent = labels[idx];

      item.appendChild(wrapper);
      item.appendChild(num);
      item.onclick = function() { goTo(idx); };
      sidebar.appendChild(item);
    })(i);
  }
}

function goTo(idx) {
  current = Math.max(0, Math.min(slides.length - 1, idx));
  document.getElementById('mainSlide').src = slides[current];
  document.getElementById('counter').textContent = 'Slide ' + (current + 1) + ' of ' + slides.length;
  for (var i = 0; i < slides.length; i++) {
    var el = document.getElementById('thumb-' + i);
    if (el) el.className = i === current ? 'thumb-item active' : 'thumb-item';
  }
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
});

buildSidebar();
</script>
</body>
</html>
