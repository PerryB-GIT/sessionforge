coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "**/*.config.ts"
  - "**/*.config.js"
  - "**/migrations/**"
  - "**/e2e/**"
  - "**/__tests__/**"
